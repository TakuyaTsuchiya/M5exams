<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M5実習課題 レビュー</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif; }

.tab-bar {
  display: flex;
  overflow-x: auto;
  background: #f0f0f0;
  border-bottom: 2px solid #ccc;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  -webkit-overflow-scrolling: touch;
}
.tab-bar::-webkit-scrollbar { height: 3px; }
.tab-bar::-webkit-scrollbar-thumb { background: #aaa; border-radius: 3px; }

.tab {
  flex-shrink: 0;
  padding: 10px 16px;
  font-size: 13px;
  cursor: pointer;
  border-right: 1px solid #ddd;
  background: #f0f0f0;
  color: #666;
  white-space: nowrap;
  transition: background 0.15s, color 0.15s;
  user-select: none;
}
.tab:hover { background: #e0e0e0; }
.tab.active {
  background: #fff;
  color: #333;
  font-weight: bold;
  border-bottom: 2px solid #3498db;
  margin-bottom: -2px;
}
.tab.question { border-left: 3px solid #3498db; }
.tab.explanation { border-left: 3px solid #e67e22; }

.content-frame {
  position: fixed;
  top: 42px;
  left: 0;
  width: 100%;
  height: calc(100vh - 42px);
  border: none;
}
</style>
</head>
<body>
<div id="auth-wall" style="display:none; max-width:400px; margin:100px auto; text-align:center; font-family:sans-serif;">
<h2>M5実習課題 レビューサイト</h2>
<form id="auth-form">
<input id="auth-pass" type="password" placeholder="パスワードを入力" style="padding:10px;font-size:16px;width:200px;border:1px solid #ccc;border-radius:4px;">
<button type="submit" style="padding:10px 20px;font-size:16px;margin-left:8px;background:#3498db;color:#fff;border:none;border-radius:4px;cursor:pointer;">確認</button>
<p id="auth-error" style="color:red;margin-top:10px;"></p>
</form>
</div>
<div id="main-content" style="display:none;">

<div class="tab-bar" id="tab-bar"></div>
<iframe class="content-frame" id="content-frame"></iframe>

</div>
<script src="auth.js"></script>
<script>
var tabs = [
  { label: 'S1 課題', file: 'M5_S1_question.html', type: 'question' },
  { label: 'S1 解説', file: 'M5_S1_explanation.html', type: 'explanation' },
  { label: 'S2 課題', file: 'M5_S2_question.html', type: 'question' },
  { label: 'S2 解説', file: 'M5_S2_explanation.html', type: 'explanation' },
  { label: 'S3 課題', file: 'M5_S3_question.html', type: 'question' },
  { label: 'S3 解説', file: 'M5_S3_explanation.html', type: 'explanation' },
  { label: 'S3 ルーブリック', file: 'M5_S3_rubric.html', type: 'explanation' },
  { label: 'S4 課題', file: 'M5_S4_question.html', type: 'question' },
  { label: 'S4 解説', file: 'M5_S4_explanation.html', type: 'explanation' },
  { label: 'S5 課題', file: 'M5_S5_question.html', type: 'question' },
  { label: 'S5 解説', file: 'M5_S5_explanation.html', type: 'explanation' },
  { label: 'S6 課題', file: 'M5_S6_question.html', type: 'question' },
  { label: 'S6 解説', file: 'M5_S6_explanation.html', type: 'explanation' },
  { label: 'まとめ 課題', file: 'M5_summary_question.html', type: 'question' },
  { label: 'まとめ 解説', file: 'M5_summary_explanation.html', type: 'explanation' }
];

var bar = document.getElementById('tab-bar');
var frame = document.getElementById('content-frame');

tabs.forEach(function(t, i) {
  var el = document.createElement('div');
  el.className = 'tab ' + t.type;
  el.textContent = t.label;
  el.addEventListener('click', function() { switchTab(i); });
  bar.appendChild(el);
});

function switchTab(i) {
  var all = bar.querySelectorAll('.tab');
  all.forEach(function(el) { el.classList.remove('active'); });
  all[i].classList.add('active');
  frame.src = tabs[i].file + '?v=' + Date.now();
  // Scroll tab into view
  all[i].scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
}

// Start with S1 課題
var observer = new MutationObserver(function() {
  if (document.getElementById('main-content').style.display !== 'none') {
    switchTab(0);
    observer.disconnect();
  }
});
observer.observe(document.getElementById('main-content'), { attributes: true, attributeFilter: ['style'] });
// Also handle case where already visible
if (document.getElementById('main-content').style.display !== 'none') {
  switchTab(0);
}
</script>
</body>
</html>
